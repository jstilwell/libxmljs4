name: builds

on:
  push:
    tags:
      - v*
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            windows-2025,
            windows-11-arm,
            macos-15,
            ubuntu-22.04,
            ubuntu-22.04-arm,
          ]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: corepack enable
      - run: pnpm i --frozen-lockfile
        env:
          npm_config_build_from_source: true
      - run: pnpm build:ts
      - run: pnpm tsd
      - run: pnpm test
  prebuild:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            windows-2025,
            windows-11-arm,
            macos-15,
            ubuntu-22.04,
            ubuntu-22.04-arm,
          ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm i --frozen-lockfile
        env:
          npm_config_build_from_source: true
      - run: pnpm prebuild
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-prebuild
          path: "prebuilds/"
  alpine:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node: [22, 24]
      fail-fast: true
    container:
      image: node:${{ matrix.node }}-alpine
    steps:
      - uses: actions/checkout@v4
      - run: |
          apk add --no-cache python3 make g++
      - run: corepack enable
      - run: pnpm i --frozen-lockfile
        env:
          npm_config_build_from_source: true
      - run: pnpm build:ts
      - run: pnpm tsd
      - run: pnpm test
      - run: pnpm prebuild
      - uses: actions/upload-artifact@v4
        if: matrix.node == 24
        with:
          name: alpine-prebuild
          path: "prebuilds/"
  deploy:
    runs-on: ubuntu-latest
    needs: [alpine, prebuild, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: prebuilds
          pattern: "*-prebuild"
          merge-multiple: true
      - run: find prebuilds -type f | head -50
      - uses: softprops/action-gh-release@v2
        with:
          files: ./prebuilds/**/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
